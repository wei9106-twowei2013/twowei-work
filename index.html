<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作進度回報系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Firebase SDK (compat version — works in plain HTML without bundler) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:   #0F172A;
    --navy2:  #1E293B;
    --navy3:  #334155;
    --cyan:   #06B6D4;
    --cyan2:  #0891B2;
    --snow:   #F8FAFC;
    --muted:  #94A3B8;
    --green:  #10B981;
    --amber:  #F59E0B;
    --red:    #EF4444;
    --purple: #8B5CF6;
    --card:   #ffffff;
    --border: #E2E8F0;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--snow);
    color: var(--navy);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--navy3);
  }
  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    color: white;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo span { color: var(--cyan); }
  .header-right { display: flex; align-items: center; gap: 1rem; }
  .today-label {
    font-size: 0.78rem;
    color: var(--muted);
  }
  .sync-status {
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
    transition: opacity 0.3s;
  }
  .sync-status.synced { color: var(--green); }
  .sync-status.error { color: var(--amber); }
  .retry-btn {
    background: transparent;
    border: 1px solid var(--navy3);
    color: var(--snow);
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .retry-btn:hover { background: var(--navy3); }
  .btn-new {
    background: var(--cyan);
    color: white;
    border: none;
    padding: 7px 16px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 0.83rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s;
  }
  .btn-new:hover { background: var(--cyan2); }

  .btn-pdf {
    background: transparent;
    color: var(--snow);
    border: 1.5px solid var(--navy3);
    padding: 6px 14px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 0.83rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s;
  }
  .btn-pdf:hover { background: var(--navy3); }

  /* ── LAYOUT ── */
  .main-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.4rem;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .stat-label {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .stat-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1;
  }
  .stat-value.green  { color: var(--green); }
  .stat-value.cyan   { color: var(--cyan); }
  .stat-value.amber  { color: var(--amber); }
  .stat-value.red    { color: var(--red); }
  .stat-sub { font-size: 0.75rem; color: var(--muted); }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
  }
  .toolbar-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    flex: 1;
  }
  .reorder-hint {
    font-size: 0.75rem;
    color: var(--muted);
    margin-right: 12px;
  }
  .filter-group { display: flex; gap: 6px; }
  .filter-btn {
    border: 1px solid var(--border);
    background: white;
    color: var(--navy3);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--navy);
    color: white;
    border-color: var(--navy);
  }

  /* SEARCH / FILTER ROW */
  .search-row {
    display: flex;
    gap: 0.7rem;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
  }
  .search-input { flex: 1; min-width: 200px; }
  .filter-select {
    width: auto;
    min-width: 130px;
    cursor: pointer;
  }

  /* ── TASK TABLE ── */
  .task-table {
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .task-table table { width: 100%; border-collapse: collapse; }
  .task-table thead tr {
    background: var(--navy);
    color: white;
  }
  .task-table th {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
    padding: 12px 16px;
    text-align: left;
    white-space: nowrap;
  }
  .task-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }
  .task-table tbody tr:last-child { border-bottom: none; }
  .task-table tbody tr:hover { background: #F1F5F9; }
  .task-table td { padding: 13px 16px; vertical-align: middle; }

  .task-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 2px; }
  .task-project { font-size: 0.75rem; color: var(--muted); }
  .col-client, .col-period { white-space: nowrap; }

  /* DRAG TO REORDER */
  .col-drag { width: 28px; padding-left: 8px !important; padding-right: 0 !important; }
  .drag-handle {
    cursor: grab;
    color: var(--muted);
    font-size: 1rem;
    user-select: none;
    display: inline-block;
  }
  .drag-handle:active { cursor: grabbing; }
  tr.row-draggable.dragging { opacity: 0.4; }
  tr.row-draggable.drag-over {
    box-shadow: inset 0 2px 0 0 var(--cyan);
  }

  /* STATUS BADGE */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.73rem;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .badge.done    { background: #D1FAE5; color: #065F46; }
  .badge.done::before { background: var(--green); }
  .badge.inprog  { background: #CFFAFE; color: #0E7490; }
  .badge.inprog::before { background: var(--cyan); }
  .badge.pending { background: #FEF3C7; color: #92400E; }
  .badge.pending::before { background: var(--amber); }
  .badge.blocked { background: #FEE2E2; color: #991B1B; }
  .badge.blocked::before { background: var(--red); }

  /* PROGRESS BAR */
  .progress-wrap { width: 120px; }
  .progress-bar-bg {
    background: var(--border);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
    margin-bottom: 4px;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .fill-green  { background: var(--green); }
  .fill-cyan   { background: var(--cyan); }
  .fill-amber  { background: var(--amber); }
  .fill-red    { background: var(--red); }
  .progress-pct { font-size: 0.75rem; font-weight: 600; color: var(--navy3); }

  /* ASSIGNEE */
  .avatar {
    min-width: 44px; height: 30px;
    padding: 0 8px;
    border-radius: 15px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .assignee-cell {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .color-swatches {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .color-swatches .swatch-label {
    font-size: 0.75rem;
    color: var(--muted);
    margin-right: 2px;
  }
  .color-swatch {
    width: 22px; height: 22px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.1s, border-color 0.1s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: var(--navy); }
  .color-swatch.auto {
    background: repeating-linear-gradient(45deg, #cbd5e1, #cbd5e1 4px, #fff 4px, #fff 8px);
  }

  /* DUE DATE */
  .due-date { font-size: 0.8rem; color: var(--navy3); white-space: nowrap; }
  .due-date.overdue { color: var(--red); font-weight: 600; }

  /* ROW ACTIONS */
  .row-actions { display: flex; gap: 6px; opacity: 0.45; transition: opacity 0.15s; }
  tr:hover .row-actions, .row-actions:focus-within { opacity: 1; }
  .icon-btn {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    transition: background 0.1s;
  }
  .icon-btn:hover { background: var(--navy); color: white; border-color: var(--navy); }
  .icon-btn.danger:hover { background: var(--red); border-color: var(--red); }
  .complete-btn:hover { background: var(--green); border-color: var(--green); color: white; }
  .complete-btn.active { background: var(--green); border-color: var(--green); color: white; }

  /* ── LOGIN OVERLAY ── */
  .login-overlay {
    position: fixed; inset: 0;
    background: var(--navy);
    display: flex; align-items: center; justify-content: center;
    z-index: 500;
  }
  .login-overlay.hidden { display: none; }
  .login-card {
    background: var(--navy2);
    border: 1px solid var(--navy3);
    border-radius: 16px;
    padding: 2.5rem;
    width: 340px;
    max-width: 90vw;
    text-align: center;
  }
  .login-logo {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
    color: white;
    margin-bottom: 8px;
  }
  .login-logo span { color: var(--cyan); }
  .login-sub {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
  }
  .login-input {
    width: 100%;
    border: 1.5px solid var(--navy3);
    background: var(--navy);
    color: var(--snow);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.95rem;
    text-align: center;
    outline: none;
    margin-bottom: 12px;
  }
  .login-input:focus { border-color: var(--cyan); }
  .login-btn {
    width: 100%;
    background: var(--cyan);
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .login-btn:hover { background: var(--cyan2); }
  .login-error {
    color: var(--red);
    font-size: 0.8rem;
    margin-top: 12px;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(15,23,42,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: white;
    border-radius: 16px;
    padding: 2rem;
    width: 480px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(16px);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
  }
  .form-group { margin-bottom: 1.1rem; }
  .form-label { font-size: 0.8rem; font-weight: 600; color: var(--navy3); margin-bottom: 5px; display: block; }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 0.88rem;
    color: var(--navy);
    outline: none;
    transition: border 0.15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--cyan);
  }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .range-wrap { display: flex; align-items: center; gap: 10px; }
  .range-wrap input[type=range] { flex: 1; accent-color: var(--cyan); }
  .range-pct { font-weight: 700; font-size: 0.9rem; min-width: 36px; text-align: right; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 1.5rem; }
  .btn-cancel {
    padding: 8px 18px;
    border: 1.5px solid var(--border);
    background: white;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
  }
  .btn-save {
    padding: 8px 20px;
    background: var(--cyan);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-save:hover { background: var(--cyan2); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 2rem; right: 2rem;
    background: var(--navy);
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 500;
    z-index: 300;
    transform: translateY(10px);
    opacity: 0;
    transition: all 0.25s;
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── EMPTY ── */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .empty-state p { font-size: 0.9rem; }

  /* ══════════════════════════════════════════
     RESPONSIVE — Mobile-first card layout
     ══════════════════════════════════════════ */
  @media (max-width: 768px) {

    /* Header */
    header {
      padding: 0 1rem;
      height: auto;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 10px;
      padding-bottom: 10px;
    }
    .header-right {
      flex-wrap: wrap;
      gap: 6px;
      width: 100%;
    }
    .btn-new, .btn-pdf {
      font-size: 0.75rem;
      padding: 6px 10px;
      flex: 1;
      justify-content: center;
    }
    .sync-status, .today-label { font-size: 0.7rem; }

    /* Stats */
    .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .stat-value { font-size: 1.6rem; }

    /* Toolbar */
    .toolbar { flex-wrap: wrap; gap: 8px; }
    .filter-group { width: 100%; overflow-x: auto; display: flex; gap: 6px; padding-bottom: 4px; }
    .filter-btn { white-space: nowrap; font-size: 0.75rem; }
    .reorder-hint { font-size: 0.72rem; width: 100%; }

    /* Search row */
    .search-row { flex-direction: column; gap: 8px; }
    .filter-select, .search-input { width: 100%; }

    /* Hide the desktop TABLE, show CARDS instead */
    .task-table table { display: none; }
    .task-table { background: transparent; border: none; border-radius: 0; overflow: visible; }
    #emptyState { display: none; }

    /* Card list */
    .card-list { display: flex; flex-direction: column; gap: 10px; }
    .task-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 14px 10px;
      position: relative;
      touch-action: none; /* needed for touch drag */
    }
    .task-card.dragging { opacity: 0.4; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
    .task-card.drag-over { box-shadow: inset 0 3px 0 0 var(--cyan); }

    .card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
    .card-drag-handle {
      font-size: 1.1rem;
      color: var(--muted);
      cursor: grab;
      padding: 2px 4px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .card-title-block { flex: 1; min-width: 0; }
    .card-name { font-weight: 700; font-size: 0.95rem; color: var(--navy); line-height: 1.3; }
    .card-desc { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    .card-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
      margin-bottom: 10px;
    }
    .card-meta-item { display: flex; flex-direction: column; }
    .card-meta-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px; }
    .card-meta-value { font-size: 0.8rem; color: var(--navy3); font-weight: 500; }

    .card-progress-row { margin-bottom: 10px; }
    .card-progress-bar {
      background: var(--border);
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .card-progress-fill { height: 100%; border-radius: 4px; }
    .card-progress-pct { font-size: 0.75rem; font-weight: 600; color: var(--navy3); }

    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .card-assignee { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .card-actions { display: flex; gap: 6px; }
    .card-actions .icon-btn {
      opacity: 1 !important; /* always visible on mobile */
      width: 32px; height: 32px;
      font-size: 0.9rem;
    }

    /* Show card list, hide empty state div (handled in JS) */
    #cardList { margin-top: 0; }

    /* Modal full-screen on mobile */
    .modal { width: 100% !important; max-width: 100% !important; margin: 0; border-radius: 16px 16px 0 0; position: fixed; bottom: 0; max-height: 90vh; }
    .modal-overlay { align-items: flex-end; }

    /* Progress bar */
    .progress-wrap { width: 80px; }
  }

  /* Tablet tweaks */
  @media (min-width: 769px) {
    .card-list { display: none; } /* hide cards on desktop */
    #cardList { display: none; }
  }

  @media (max-width: 480px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .main-wrap { padding: 1rem; }
  }

  /* ── PRINT / PDF EXPORT ── */
  @media print {
    body * { visibility: hidden; }
    #printArea, #printArea * { visibility: visible; }
    #printArea {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      display: block !important;
    }
    #printArea h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.3rem;
      margin-bottom: 4px;
    }
    #printArea .print-meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 16px;
    }
    #printArea table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
    }
    #printArea th, #printArea td {
      border: 1px solid #ccc;
      padding: 6px 8px;
      text-align: left;
    }
    #printArea th {
      background: #f1f5f9;
    }
    .row-actions { display: none !important; }
  }
  #printArea { display: none; }
</style>
<!-- Hidden container used only when generating a PDF -->
<div id="printArea"></div>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <div class="login-logo">⬡ <span>Progress</span>Track</div>
    <p class="login-sub">請輸入團隊密碼以繼續</p>
    <input type="password" class="login-input" id="loginInput" placeholder="密碼" autocomplete="off">
    <button class="login-btn" onclick="checkPassword()">登入</button>
    <p class="login-error" id="loginError" style="display:none;">密碼錯誤，請再試一次</p>
  </div>
</div>

<header>
  <div class="logo">⬡ <span>Progress</span>Track</div>
  <div class="header-right">

<!-- TOAST -->
<div class="toast" id="toast">✓ <span id="toastMsg"></span></div>

<script>
  // ── DATA (Firestore — free, no login required for visitors) ──
  const firebaseConfig = {
    apiKey: "AIzaSyD6t7woI7dDhIU-Ta9bQJyIUcdyNOHMkV8",
    authDomain: "twowei-progresstrack.firebaseapp.com",
    projectId: "twowei-progresstrack",
    storageBucket: "twowei-progresstrack.firebasestorage.app",
    messagingSenderId: "1016966707396",
    appId: "1:1016966707396:web:1aeb01a954f8c261b7f191"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const DOC_REF = db.collection('progresstrack').doc('tasks');

  let tasks = [];
  let editId = null;
  let currentFilter = 'all';
  let nextId = 1;
  let isSyncing = false;
  let lastSavedJSON = '';
  let failCount = 0;

  const DEFAULT_TASKS = [
    { id:1, name:'Q2 行銷活動企劃', project:'行銷部門', client:'台積電', period:'2026-06', desc:'', status:'inprog', progress:65, assignee:'王小明', due:'2026-06-30' },
    { id:2, name:'產品功能需求文件', project:'產品開發', client:'鴻海', period:'2026-06', desc:'', status:'done', progress:100, assignee:'林小華', due:'2026-06-10' },
    { id:3, name:'新版 UI 設計稿審核', project:'設計部門', client:'台積電', period:'2026-07', desc:'', status:'pending', progress:20, assignee:'陳大偉', due:'2026-07-05' },
    { id:4, name:'第三方 API 串接', project:'產品開發', client:'聯發科', period:'2026-06', desc:'', status:'blocked', progress:40, assignee:'張美玲', due:'2026-06-20' },
    { id:5, name:'客戶提案簡報製作', project:'業務部門', client:'鴻海', period:'2026-06', desc:'', status:'inprog', progress:80, assignee:'李建國', due:'2026-06-25' },
  ];

  function setSyncStatus(state) {
    const el = document.getElementById('syncStatus');
    const retryBtn = document.getElementById('retryBtn');
    if (!el) return;
    if (state === 'syncing') { el.textContent = '🔄 同步中…'; el.className = 'sync-status'; }
    else if (state === 'synced') { el.textContent = '✓ 已同步'; el.className = 'sync-status synced'; }
    else if (state === 'error') { el.textContent = '⚠ 連線異常'; el.className = 'sync-status error'; }
    if (retryBtn) retryBtn.style.display = (state === 'error') ? 'inline-block' : 'none';
  }

  function manualRetry() {
    failCount = 0;
    loadTasks(false);
  }

  async function loadTasks(isPoll) {
    if (isPoll && isSyncing) return;
    if (!isPoll) setSyncStatus('syncing');
    try {
      const snap = await DOC_REF.get();
      if (!snap.exists) {
        // First ever load — seed with defaults
        tasks = DEFAULT_TASKS;
        nextId = tasks.reduce((m,t)=>Math.max(m,t.id),0)+1;
        renderTable();
        await persistTasks();
        return;
      }
      const json = JSON.stringify(snap.data().tasks);
      if (isPoll && json === lastSavedJSON) { failCount = 0; setSyncStatus('synced'); return; }
      tasks = snap.data().tasks;
      lastSavedJSON = json;
      nextId = tasks.reduce((m,t)=>Math.max(m,t.id),0)+1;
      renderTable();
      failCount = 0;
      setSyncStatus('synced');
    } catch (err) {
      failCount++;
      console.warn(`讀取資料失敗（第 ${failCount} 次）`, err);
      if (!isPoll) {
        if (failCount <= 4) {
          setTimeout(() => loadTasks(false), failCount * 1000);
        } else {
          if (!tasks.length) {
            tasks = DEFAULT_TASKS;
            nextId = tasks.reduce((m,t)=>Math.max(m,t.id),0)+1;
          }
          renderTable();
          setSyncStatus('error');
          showToast('⚠ 無法連線，目前顯示暫存內容');
        }
      } else {
        if (failCount === 1) setTimeout(() => loadTasks(true), 2000);
        else if (failCount >= 3) setSyncStatus('error');
      }
    }
  }

  async function persistTasks(retryCount) {
    retryCount = retryCount || 0;
    setSyncStatus('syncing');
    isSyncing = true;
    const json = JSON.stringify(tasks);
    lastSavedJSON = json;
    try {
      await DOC_REF.set({ tasks: tasks });
      failCount = 0;
      setSyncStatus('synced');
      isSyncing = false;
    } catch (err) {
      console.warn(`儲存失敗（第 ${retryCount+1} 次）`, err);
      if (retryCount < 2) {
        setTimeout(() => persistTasks(retryCount+1), 1500);
        return;
      }
      isSyncing = false;
      setSyncStatus('error');
      showToast('⚠ 儲存失敗，請檢查網路後再試');
    }
  }

  async function saveTasks() { await persistTasks(); }

  // 即時監聽 Firestore 變更，有人儲存時所有人自動更新
  function startRealtimeSync() {
    DOC_REF.onSnapshot(snap => {
      if (isSyncing) return; // 自己正在寫入時忽略
      if (!snap.exists) return;
      const json = JSON.stringify(snap.data().tasks);
      if (json === lastSavedJSON) return;
      tasks = snap.data().tasks;
      lastSavedJSON = json;
      nextId = tasks.reduce((m,t)=>Math.max(m,t.id),0)+1;
      renderTable();
      setSyncStatus('synced');
    }, err => {
      console.warn('即時同步錯誤', err);
    });
  }

  // ── TODAY ──
  const now = new Date();
  document.getElementById('todayLabel').textContent =
    now.toLocaleDateString('zh-TW', {year:'numeric',month:'long',day:'numeric',weekday:'short'});

  // ── RENDER ──
  const statusMap = {
    done:    { label:'已完成', cls:'done',    fill:'fill-green', color:'green' },
    inprog:  { label:'進行中', cls:'inprog',  fill:'fill-cyan',  color:'cyan'  },
    pending: { label:'待處理', cls:'pending', fill:'fill-amber', color:'amber' },
    blocked: { label:'停等中', cls:'blocked', fill:'fill-red',   color:'red'   },
  };
  const avatarColors = [
    '#E53E3E', // 紅
    '#DD6B20', // 橘
    '#D69E2E', // 金黃
    '#38A169', // 綠
    '#00B5D8', // 青
    '#3182CE', // 藍
    '#6B46C1', // 深紫
    '#D53F8C', // 粉紅
    '#2D3748', // 深灰
    '#319795', // 藍綠（與青差異足夠）
  ];

  function avatarColor(name) {
    let h = 0;
    for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
    return avatarColors[h % avatarColors.length];
  }

  // Split a "負責人" field on common separators so multiple people can each
  // get their own avatar circle (e.g. "俊偉、昆毅" -> ["俊偉","昆毅"]).
  function splitAssignees(str) {
    return String(str||'')
      .split(/[、,，/\s]+/)
      .map(s=>s.trim())
      .filter(Boolean);
  }

  // Render one circular avatar per person, each containing their full name.
  // customColor (if set) overrides the auto-generated color for ALL avatars
  // in this cell.
  function renderAvatars(assigneeStr, customColor) {
    const names = splitAssignees(assigneeStr);
    if (!names.length) return '—';
    return `<div class="assignee-cell">` +
      names.map(name => {
        const bg = customColor || avatarColor(name);
        return `<span class="avatar" style="background:${bg}" title="${esc(name)}">${esc(name)}</span>`;
      }).join('') +
      `</div>`;
  }

  function renderTable() {
    // Populate period & client filter dropdowns from current data
    populateFilterOptions();

    const filtered = getFilteredTasks();
    const reorderable = canReorder();
    document.getElementById('reorderHint').style.display = reorderable ? 'block' : 'none';

    const tbody = document.getElementById('taskBody');
    const empty = document.getElementById('emptyState');

    if (!filtered.length) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      updateStats();
      return;
    }
    empty.style.display = 'none';

    tbody.innerHTML = filtered.map(t => {
      const sm = statusMap[t.status] || statusMap.pending;
      const dueStr = t.due ? formatDate(t.due) : '—';
      const isOverdue = t.due && new Date(t.due) < now && t.status !== 'done';
      const pct = Math.min(100, Math.max(0, t.progress||0));
      const avatarsHtml = renderAvatars(t.assignee, t.assigneeColor);
      const draggable = reorderable ? 'true' : 'false';
      return `
      <tr draggable="${draggable}" data-id="${t.id}" class="${reorderable ? 'row-draggable' : ''}">
        <td class="col-drag">${reorderable ? '<span class="drag-handle" title="拖曳排序">⠿</span>' : ''}</td>
        <td>
          <div class="task-name">${esc(t.name)}</div>
          <div class="task-project">${esc(t.desc||'')}</div>
        </td>
        <td class="col-project"><span style="font-size:.8rem;color:var(--navy3)">${esc(t.project||'—')}</span></td>
        <td class="col-client"><span style="font-size:.8rem;color:var(--navy3)">${esc(t.client||'—')}</span></td>
        <td class="col-period"><span style="font-size:.8rem;color:var(--navy3)">${esc(t.period||'—')}</span></td>
        <td><span class="badge ${sm.cls}">${sm.label}</span></td>
        <td>
          <div class="progress-wrap">
            <div class="progress-bar-bg">
              <div class="progress-bar-fill ${sm.fill}" style="width:${pct}%"></div>
            </div>
            <div class="progress-pct">${pct}%</div>
          </div>
        </td>
        <td class="col-assignee">
          ${avatarsHtml}
        </td>
        <td><span class="due-date${isOverdue?' overdue':''}">${dueStr}</span></td>
        <td>
          <div class="row-actions">
            <button class="icon-btn complete-btn${t.status==='done' ? ' active' : ''}" onclick="toggleComplete(${t.id})" title="${t.status==='done' ? '取消完成' : '標記為已完成'}">✓</button>
            <button class="icon-btn" onclick="openEdit(${t.id})" title="編輯">✏️</button>
            <button class="icon-btn danger" onclick="deleteTask(${t.id})" title="刪除">🗑️</button>
          </div>
        </td>
      </tr>`;
    }).join('');

    if (reorderable) attachDragHandlers();

    // ── MOBILE CARD LIST ──
    renderCards(filtered, reorderable);

    updateStats();
  }

  function renderCards(filtered, reorderable) {
    const cardList = document.getElementById('cardList');
    if (!cardList) return;

    if (!filtered.length) {
      cardList.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>尚無符合條件的工作<br>點擊右上角「新增工作」開始吧！</p></div>`;
      return;
    }

    cardList.innerHTML = filtered.map(t => {
      const sm = statusMap[t.status] || statusMap.pending;
      const dueStr = t.due ? formatDate(t.due) : '—';
      const isOverdue = t.due && new Date(t.due) < now && t.status !== 'done';
      const pct = Math.min(100, Math.max(0, t.progress||0));
      const avatarsHtml = renderAvatars(t.assignee, t.assigneeColor);
      return `
      <div class="task-card" data-id="${t.id}" ${reorderable ? 'data-draggable="true"' : ''}>
        <div class="card-top">
          ${reorderable ? `<span class="card-drag-handle" title="長按拖曳排序">⠿</span>` : ''}
          <div class="card-title-block">
            <div class="card-name">${esc(t.name)}</div>
            ${t.desc ? `<div class="card-desc">${esc(t.desc)}</div>` : ''}
          </div>
          <span class="badge ${sm.cls}" style="flex-shrink:0">${sm.label}</span>
        </div>
        <div class="card-meta">
          ${t.project ? `<div class="card-meta-item"><span class="card-meta-label">專案</span><span class="card-meta-value">${esc(t.project)}</span></div>` : ''}
          ${t.client ? `<div class="card-meta-item"><span class="card-meta-label">客戶</span><span class="card-meta-value">${esc(t.client)}</span></div>` : ''}
          ${t.period ? `<div class="card-meta-item"><span class="card-meta-label">年月</span><span class="card-meta-value">${esc(t.period)}</span></div>` : ''}
          ${t.due ? `<div class="card-meta-item"><span class="card-meta-label">預定完成</span><span class="card-meta-value${isOverdue?' overdue':''}">${dueStr}</span></div>` : ''}
        </div>
        <div class="card-progress-row">
          <div class="card-progress-bar">
            <div class="card-progress-fill ${sm.fill}" style="width:${pct}%"></div>
          </div>
          <div class="card-progress-pct">${pct}%</div>
        </div>
        <div class="card-footer">
          <div class="card-assignee">${avatarsHtml}</div>
          <div class="card-actions">
            <button class="icon-btn complete-btn${t.status==='done' ? ' active' : ''}" onclick="toggleComplete(${t.id})" title="${t.status==='done' ? '取消完成' : '標記完成'}">✓</button>
            <button class="icon-btn" onclick="openEdit(${t.id})" title="編輯">✏️</button>
            <button class="icon-btn danger" onclick="deleteTask(${t.id})" title="刪除">🗑️</button>
          </div>
        </div>
      </div>`;
    }).join('');

    if (reorderable) attachCardDragHandlers();
  }

  // ── DRAG TO REORDER ──
  let dragSrcId = null;

  function attachDragHandlers() {
    const tbody = document.getElementById('taskBody');
    tbody.querySelectorAll('tr.row-draggable').forEach(row => {
      row.addEventListener('dragstart', (e) => {
        dragSrcId = parseInt(row.dataset.id);
        row.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(dragSrcId));
      });
      row.addEventListener('dragend', () => {
        row.classList.remove('dragging');
        tbody.querySelectorAll('tr.drag-over').forEach(r=>r.classList.remove('drag-over'));
      });
      row.addEventListener('dragover', (e) => {
        e.preventDefault();
        if (parseInt(row.dataset.id) !== dragSrcId) row.classList.add('drag-over');
      });
      row.addEventListener('dragleave', () => {
        row.classList.remove('drag-over');
      });
      row.addEventListener('drop', (e) => {
        e.preventDefault();
        row.classList.remove('drag-over');
        const targetId = parseInt(row.dataset.id);
        if (dragSrcId === null || targetId === dragSrcId) return;
        reorderTasks(dragSrcId, targetId);
      });
    });
  }

  async function reorderTasks(srcId, targetId) {
    const srcIdx = tasks.findIndex(t => t.id === srcId);
    const targetIdx = tasks.findIndex(t => t.id === targetId);
    if (srcIdx === -1 || targetIdx === -1) return;

    const [moved] = tasks.splice(srcIdx, 1);
    // Recompute target index after removal
    const newTargetIdx = tasks.findIndex(t => t.id === targetId);
    tasks.splice(newTargetIdx, 0, moved);

    renderTable();
    await persistTasks();
  }

  // ── MOBILE TOUCH DRAG (long-press to reorder cards) ──
  let touchDragId = null;
  let touchDragEl = null;
  let touchDragClone = null;
  let touchLongPressTimer = null;
  const LONG_PRESS_MS = 500;

  function attachCardDragHandlers() {
    const cardList = document.getElementById('cardList');
    if (!cardList) return;

    cardList.querySelectorAll('.task-card[data-draggable="true"]').forEach(card => {
      card.addEventListener('touchstart', onCardTouchStart, { passive: false });
      card.addEventListener('touchmove', onCardTouchMove, { passive: false });
      card.addEventListener('touchend', onCardTouchEnd);
      card.addEventListener('touchcancel', onCardTouchCancel);
    });
  }

  function onCardTouchStart(e) {
    const card = e.currentTarget;
    touchLongPressTimer = setTimeout(() => {
      touchDragId = parseInt(card.dataset.id);
      touchDragEl = card;
      card.classList.add('dragging');

      // Create a visual clone that follows the finger
      touchDragClone = card.cloneNode(true);
      touchDragClone.style.cssText = `
        position: fixed; z-index: 999; pointer-events: none;
        width: ${card.offsetWidth}px; opacity: 0.85;
        box-shadow: 0 8px 24px rgba(0,0,0,0.2); border-radius: 12px;
      `;
      document.body.appendChild(touchDragClone);
      updateClonePosition(e.touches[0]);

      // Haptic feedback on supported devices
      if (navigator.vibrate) navigator.vibrate(50);
    }, LONG_PRESS_MS);
  }

  function onCardTouchMove(e) {
    if (!touchDragId) {
      clearTimeout(touchLongPressTimer);
      return;
    }
    e.preventDefault();
    const touch = e.touches[0];
    updateClonePosition(touch);

    // Find which card the finger is over
    touchDragClone.style.display = 'none';
    const elBelow = document.elementFromPoint(touch.clientX, touch.clientY);
    touchDragClone.style.display = '';

    document.querySelectorAll('.task-card.drag-over').forEach(c => c.classList.remove('drag-over'));
    const targetCard = elBelow?.closest?.('.task-card');
    if (targetCard && parseInt(targetCard.dataset.id) !== touchDragId) {
      targetCard.classList.add('drag-over');
    }
  }

  function onCardTouchEnd(e) {
    clearTimeout(touchLongPressTimer);
    if (!touchDragId) return;

    const touch = e.changedTouches[0];
    touchDragClone.style.display = 'none';
    const elBelow = document.elementFromPoint(touch.clientX, touch.clientY);
    touchDragClone.style.display = '';

    const targetCard = elBelow?.closest?.('.task-card');
    const targetId = targetCard ? parseInt(targetCard.dataset.id) : null;

    // Cleanup
    if (touchDragEl) touchDragEl.classList.remove('dragging');
    if (touchDragClone) touchDragClone.remove();
    document.querySelectorAll('.task-card.drag-over').forEach(c => c.classList.remove('drag-over'));

    const srcId = touchDragId;
    touchDragId = null; touchDragEl = null; touchDragClone = null;

    if (targetId && targetId !== srcId) reorderTasks(srcId, targetId);
  }

  function onCardTouchCancel() {
    clearTimeout(touchLongPressTimer);
    if (touchDragEl) touchDragEl.classList.remove('dragging');
    if (touchDragClone) touchDragClone.remove();
    document.querySelectorAll('.task-card.drag-over').forEach(c => c.classList.remove('drag-over'));
    touchDragId = null; touchDragEl = null; touchDragClone = null;
  }

  function updateClonePosition(touch) {
    if (!touchDragClone) return;
    touchDragClone.style.left = (touch.clientX - touchDragClone.offsetWidth / 2) + 'px';
    touchDragClone.style.top  = (touch.clientY - 40) + 'px';
  }

  function updateStats() {
    document.getElementById('statTotal').textContent   = tasks.length;
    document.getElementById('statDone').textContent    = tasks.filter(t=>t.status==='done').length;
    document.getElementById('statInprog').textContent  = tasks.filter(t=>t.status==='inprog').length;
    document.getElementById('statBlocked').textContent = tasks.filter(t=>t.status==='blocked').length;
  }

  function formatDate(s) {
    const d = new Date(s + 'T00:00:00');
    return d.toLocaleDateString('zh-TW', {month:'numeric',day:'numeric'});
  }

  // Format "2026-06" -> "2026年6月" for dropdown labels
  function formatPeriodLabel(p) {
    const [y, m] = p.split('-');
    return `${y}年${parseInt(m,10)}月`;
  }

  // Build the 年月 / 客戶 / 負責人 filter dropdowns from current task data,
  // preserving the user's current selection if still valid.
  function populateFilterOptions() {
    const periodSel   = document.getElementById('periodFilter');
    const clientSel   = document.getElementById('clientFilter');
    const assigneeSel = document.getElementById('assigneeFilter');
    const prevPeriod   = periodSel.value;
    const prevClient   = clientSel.value;
    const prevAssignee = assigneeSel.value;

    const periods   = [...new Set(tasks.map(t=>t.period).filter(Boolean))].sort().reverse();
    const clients   = [...new Set(tasks.map(t=>t.client).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'zh-Hant'));
    // Flatten all assignee names (handles multi-person like "俊偉、昆毅")
    const assignees = [...new Set(
      tasks.flatMap(t => splitAssignees(t.assignee))
    )].sort((a,b)=>a.localeCompare(b,'zh-Hant'));

    periodSel.innerHTML = '<option value="">所有年月</option>' +
      periods.map(p=>`<option value="${esc(p)}">${esc(formatPeriodLabel(p))}</option>`).join('');
    clientSel.innerHTML = '<option value="">所有客戶</option>' +
      clients.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
    assigneeSel.innerHTML = '<option value="">所有負責人</option>' +
      assignees.map(a=>`<option value="${esc(a)}">${esc(a)}</option>`).join('');

    if (periods.includes(prevPeriod))     periodSel.value   = prevPeriod;
    if (clients.includes(prevClient))     clientSel.value   = prevClient;
    if (assignees.includes(prevAssignee)) assigneeSel.value = prevAssignee;

    // Update the datalist used for client autocomplete in the form
    const datalist = document.getElementById('clientOptions');
    if (datalist) datalist.innerHTML = clients.map(c=>`<option value="${esc(c)}">`).join('');
  }

  function esc(s) {
    return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Returns "YYYY-MM" for the current month (for default new-task period)
  function currentMonth() {
    const y = now.getFullYear();
    const m = String(now.getMonth()+1).padStart(2,'0');
    return `${y}-${m}`;
  }

  // ── PDF EXPORT (uses browser print-to-PDF) ──
  // Reordering is only safe when the displayed list is exactly `tasks`
  // (no status filter, search, or dropdown filters) so drag positions map
  // 1:1 to array indices.
  function canReorder() {
    const periodFilter   = document.getElementById('periodFilter').value;
    const clientFilter   = document.getElementById('clientFilter').value;
    const assigneeFilter = document.getElementById('assigneeFilter').value;
    const searchTerm = document.getElementById('searchInput').value.trim();
    return currentFilter === 'all' && !periodFilter && !clientFilter && !assigneeFilter && !searchTerm;
  }

  function getFilteredTasks() {
    let filtered = currentFilter === 'all'
      ? tasks
      : tasks.filter(t => t.status === currentFilter);

    const periodFilter   = document.getElementById('periodFilter').value;
    const clientFilter   = document.getElementById('clientFilter').value;
    const assigneeFilter = document.getElementById('assigneeFilter').value;
    const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();

    if (periodFilter)   filtered = filtered.filter(t => (t.period||'') === periodFilter);
    if (clientFilter)   filtered = filtered.filter(t => (t.client||'') === clientFilter);
    if (assigneeFilter) filtered = filtered.filter(t => splitAssignees(t.assignee).includes(assigneeFilter));
    if (searchTerm) {
      filtered = filtered.filter(t =>
        (t.name||'').toLowerCase().includes(searchTerm) ||
        (t.project||'').toLowerCase().includes(searchTerm) ||
        (t.client||'').toLowerCase().includes(searchTerm) ||
        (t.assignee||'').toLowerCase().includes(searchTerm) ||
        (t.desc||'').toLowerCase().includes(searchTerm)
      );
    }
    return filtered;
  }

  function exportPDF() {
    const filtered = getFilteredTasks();
    const printArea = document.getElementById('printArea');

    const dateStr = now.toLocaleDateString('zh-TW', {year:'numeric',month:'long',day:'numeric'});

    const rows = filtered.map(t => {
      const sm = statusMap[t.status] || statusMap.pending;
      const pct = Math.min(100, Math.max(0, t.progress||0));
      const dueStr = t.due ? formatDate(t.due) : '—';
      return `
        <tr>
          <td>${esc(t.name)}${t.desc ? `<br><span style="color:#888;font-size:0.7rem;">${esc(t.desc)}</span>` : ''}</td>
          <td>${esc(t.project||'—')}</td>
          <td>${esc(t.client||'—')}</td>
          <td>${esc(t.period||'—')}</td>
          <td>${esc(sm.label)}</td>
          <td>${pct}%</td>
          <td>${esc(t.assignee||'—')}</td>
          <td>${dueStr}</td>
        </tr>`;
    }).join('');

    printArea.innerHTML = `
      <h1>工作進度回報系統</h1>
      <div class="print-meta">匯出日期：${dateStr}　共 ${filtered.length} 筆工作</div>
      <table>
        <thead>
          <tr>
            <th>工作名稱</th><th>專案</th><th>客戶</th><th>年月</th>
            <th>狀態</th><th>進度</th><th>負責人</th><th>預定完成日期</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;

    window.print();
  }

  // ── JSON 匯出 / 匯入 ──
  function exportJSON() {
    const json = JSON.stringify(tasks, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const dateStr = now.toISOString().slice(0,10);
    a.href = url;
    a.download = `progresstrack-backup-${dateStr}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast(`✓ 已匯出 ${tasks.length} 筆工作資料`);
  }

  let pendingImportData = null;

  function importJSON(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const imported = JSON.parse(e.target.result);
        if (!Array.isArray(imported)) throw new Error('格式不正確');
        const valid = imported.every(t => t.id !== undefined && t.name !== undefined);
        if (!valid) throw new Error('資料欄位不符合');

        pendingImportData = imported;
        document.getElementById('confirmText').textContent =
          `準備匯入 ${imported.length} 筆工作資料，這將完全取代目前所有工作。確定繼續？`;
        document.getElementById('confirmOverlay').classList.add('open');
        // Redirect the confirm button to handle import instead of delete
        document.getElementById('confirmDeleteBtn').textContent = '確定匯入';
        document.getElementById('confirmDeleteBtn').onclick = doImport;
      } catch (err) {
        showToast(`⚠ 匯入失敗：${err.message}`);
      }
      input.value = '';
    };
    reader.readAsText(file, 'utf-8');
  }

  async function doImport() {
    if (!pendingImportData) return;
    const imported = pendingImportData;
    pendingImportData = null;
    // Reset the confirm button back to delete behaviour
    document.getElementById('confirmDeleteBtn').textContent = '確定刪除';
    document.getElementById('confirmDeleteBtn').onclick = confirmDelete;
    closeConfirm();

    tasks = imported;
    nextId = tasks.reduce((m,t) => Math.max(m, t.id||0), 0) + 1;
    renderTable();
    showToast(`✓ 已匯入 ${tasks.length} 筆工作資料，同步中…`);
    await persistTasks();
  }


  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  // ── MODAL ──
  let selectedAssigneeColor = null; // null = auto (hash-based per name)

  function renderColorSwatches() {
    const el = document.getElementById('colorSwatches');
    const autoSelected = selectedAssigneeColor === null;
    el.innerHTML = `<span class="swatch-label">頭像顏色：</span>` +
      `<div class="color-swatch auto${autoSelected ? ' selected' : ''}" title="自動配色" onclick="pickAssigneeColor(null)"></div>` +
      avatarColors.map(c =>
        `<div class="color-swatch${c===selectedAssigneeColor?' selected':''}" style="background:${c}" onclick="pickAssigneeColor('${c}')"></div>`
      ).join('');
  }

  function pickAssigneeColor(color) {
    selectedAssigneeColor = color;
    renderColorSwatches();
  }

  function openModal() {
    editId = null;
    document.getElementById('modalTitle').textContent = '新增工作';
    document.getElementById('fName').value = '';
    document.getElementById('fProject').value = '';
    document.getElementById('fClient').value = '';
    document.getElementById('fPeriod').value = currentMonth();
    document.getElementById('fDesc').value = '';
    document.getElementById('fStatus').value = 'pending';
    document.getElementById('fDue').value = '';
    document.getElementById('fProgress').value = 0;
    document.getElementById('fProgressVal').textContent = '0%';
    document.getElementById('fAssignee').value = '';
    selectedAssigneeColor = null;
    renderColorSwatches();
    document.getElementById('modalOverlay').classList.add('open');
  }

  function openEdit(id) {
    const t = tasks.find(x=>x.id===id);
    if (!t) return;
    editId = id;
    document.getElementById('modalTitle').textContent = '編輯工作';
    document.getElementById('fName').value = t.name;
    document.getElementById('fProject').value = t.project||'';
    document.getElementById('fClient').value = t.client||'';
    document.getElementById('fPeriod').value = t.period||'';
    document.getElementById('fDesc').value = t.desc||'';
    document.getElementById('fStatus').value = t.status;
    document.getElementById('fDue').value = t.due||'';
    document.getElementById('fProgress').value = t.progress||0;
    document.getElementById('fProgressVal').textContent = (t.progress||0)+'%';
    document.getElementById('fAssignee').value = t.assignee||'';
    selectedAssigneeColor = t.assigneeColor || null;
    renderColorSwatches();
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  document.getElementById('confirmOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeConfirm();
  });

  async function saveTask() {
    const name = document.getElementById('fName').value.trim();
    if (!name) { document.getElementById('fName').focus(); return; }
    const task = {
      id: editId || nextId++,
      name,
      project: document.getElementById('fProject').value.trim(),
      client: document.getElementById('fClient').value.trim(),
      period: document.getElementById('fPeriod').value,
      desc: document.getElementById('fDesc').value.trim(),
      status: document.getElementById('fStatus').value,
      due: document.getElementById('fDue').value,
      progress: parseInt(document.getElementById('fProgress').value)||0,
      assignee: document.getElementById('fAssignee').value.trim(),
      assigneeColor: selectedAssigneeColor,
      updatedAt: Date.now(),
    };
    if (editId) {
      const idx = tasks.findIndex(t=>t.id===editId);
      tasks[idx] = task;
      showToast('工作已更新');
    } else {
      tasks.push(task);
      showToast('工作已新增');
    }
    renderTable();
    closeModal();
    await persistTasks();
  }

  let pendingDeleteId = null;

  function deleteTask(id) {
    pendingDeleteId = id;
    const t = tasks.find(x=>x.id===id);
    document.getElementById('confirmText').textContent =
      `確定要刪除「${t ? t.name : '此工作項目'}」嗎？此操作將同步給所有人，且無法復原。`;
    document.getElementById('confirmOverlay').classList.add('open');
  }

  function closeConfirm() {
    pendingDeleteId = null;
    document.getElementById('confirmOverlay').classList.remove('open');
  }

  async function confirmDelete() {
    if (pendingDeleteId === null) return;
    const id = pendingDeleteId;
    closeConfirm();
    tasks = tasks.filter(t=>t.id!==id);
    renderTable();
    showToast('工作已刪除');
    await persistTasks();
  }

  // Quick toggle: mark as done (sets progress to 100%), or revert back to
  // 進行中 (keeps the progress value it had before being marked done).
  async function toggleComplete(id) {
    const t = tasks.find(x=>x.id===id);
    if (!t) return;
    if (t.status === 'done') {
      t.status = 'inprog';
      if (t.progress === 100) t.progress = t.prevProgress ?? 80;
      showToast('已取消完成');
    } else {
      t.prevProgress = t.progress;
      t.status = 'done';
      t.progress = 100;
      showToast('工作已標記為完成');
    }
    t.updatedAt = Date.now();
    renderTable();
    await persistTasks();
  }

  // ── TOAST ──
  function showToast(msg) {
    const el = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'), 2200);
  }

  // ── SIMPLE PASSWORD GATE ──
  // Shared team password. Anyone with the URL still needs this to view/edit.
  // Note: this is a basic deterrent, not real security — the password is
  // visible in the page source to anyone who looks.
  const TEAM_PASSWORD = '54071585';
  const AUTH_KEY = 'progresstrack-auth';

  function checkPassword() {
    const input = document.getElementById('loginInput');
    const error = document.getElementById('loginError');
    if (input.value === TEAM_PASSWORD) {
      sessionStorage.setItem(AUTH_KEY, '1');
      document.getElementById('loginOverlay').classList.add('hidden');
      startApp();
    } else {
      error.style.display = 'block';
      input.value = '';
      input.focus();
    }
  }

  // Allow pressing Enter to submit
  const loginInputEl = document.getElementById('loginInput');
  if (loginInputEl) {
    loginInputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') checkPassword();
    });
  }

  function startApp() {
    loadTasks(false).then(() => {
      // 載入完成後啟動即時監聽，之後所有人的變更都會自動推送
      startRealtimeSync();
    });
  }

  // ── INIT ──
  if (sessionStorage.getItem(AUTH_KEY) === '1') {
    document.getElementById('loginOverlay').classList.add('hidden');
    startApp();
  } else {
    document.getElementById('loginInput').focus();
  }

  // Refresh immediately when the tab regains focus
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && sessionStorage.getItem(AUTH_KEY) === '1') loadTasks(true);
  });

</script>
</body>
</html>
